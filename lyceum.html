<!DOCTYPE html>
<html lang="uk">
<head>

  <title>Ліцей — Академічні ліцеї України</title>

    html, body { height: auto; overflow: auto; background: var(--gray-100); }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay" class="loading-overlay" style="position:fixed">
  <div class="spinner"></div>
  <div>Завантаження…</div>
</div>

<div id="main-content">

  <div class="page-header">

      <h1 id="lyceum-name">…</h1>
      <div class="detail-id" id="lyceum-id"></div>

    <div class="oblast-tag" id="lyceum-oblast"></div>

    <!-- General info -->
    <div class="detail-section">
      <div class="detail-section-title">Загальна інформація</div>

    <div class="detail-section">
      <div class="detail-section-title">Кластери та профілі</div>

    </div>

    <!-- Apply button -->
    <a href="https://docs.google.com/forms" target="_blank" class="btn-apply">

    </a>

  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
